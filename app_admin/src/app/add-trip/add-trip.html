
<div class="col-md-4">
    <h2 class="text-center">Add Trip</h2>
    <form *ngIf="addForm" [formGroup]="addForm" (ngSubmit)="onSubmit()">
        <div class="form-group">
            <label>Code:</label>
            <input type="text" formControlName="code" placeholder="Code" class="form-control" [ngClass]="{ 'is-invalid': submitted && code?.errors}">
            <div *ngIf="submitted && code?.errors">
                <div *ngIf="code?.errors?.['required']">
                    Trip Code is required
                </div>
            </div>
        </div>
        <div class="form-group">
            <label>Name:</label>
            <input type="text" formControlName="name" placeholder="Name" class="form-control" [ngClass]="{ 'is-invalid': submitted && name?.errors}">
            <div *ngIf="submitted && name?.errors">
                <div *ngIf="name?.errors?.['required']">
                    Name is required
                </div>
            </div>
        </div>
        <div class="form-group">
            <label>Length:</label>
            <input type="text" formControlName="length" placeholder="Name" class="form-control" [ngClass]="{ 'is-invalid': submitted && length?.errors}">
            <div *ngIf="submitted && length?.errors">
                <div *ngIf="length?.errors?.['required']">
                    Length is required
                </div>
            </div>
        </div>
        <div class="form-group">
            <label>Start:</label>
            <input type="date" formControlName="start" placeholder="Start" class="form-control" [ngClass]="{ 'is-invalid': submitted && start?.errors}">
            <div *ngIf="submitted && start?.errors">
                <div *ngIf="start?.errors?.['required']">
                    Date is required
                </div>
            </div>
        </div>
        <div class="form-group">
            <label>Resort:</label>
            <input type="text" formControlName="resort" placeholder="Resort" class="form-control" [ngClass]="{ 'is-invalid': submitted && resort?.errors}">
            <div *ngIf="submitted && resort?.errors">
                <div *ngIf="resort?.errors?.['required']">
                    Resort is required
                </div>
            </div>
        </div>
        <div class="form-group">
            <label>Per Person:</label>
            <input type="text" formControlName="perPerson" placeholder="Perperson" class="form-control" [ngClass]="{ 'is-invalid': submitted && perPerson?.errors }">
            <div *ngIf="submitted && perPerson?.errors">
                <div *ngIf="perPerson?.errors?.['required']">
                    Per Person is required
                </div>
            </div>
        </div>
        <div class="form-group">
            <label>Image Name:</label>
            <input type="text" formControlName="image" placeholder="Image" class="form-control" [ngClass]="{ 'is-invalid': submitted && image?.errors}">
            <div *ngIf="submitted && image?.errors">
                <div *ngIf="image?.errors?.['required']">
                    Image Name is required
                </div>
            </div>
        </div>
        <div class="form-group">
            <label>Description:</label>
            <input type="text" formControlName="description" placeholder="Description" class="form-control" [ngClass]="{ 'is-invalid': submitted && description?.errors }">
            <div *ngIf="submitted && description?.errors">
                <div *ngIf="description?.errors?.['required']">
                    Description is required.
                </div>
            </div>
        </div>
        <button type="submit" class="btn btn-info">Save</button>
    </form>
</div>
